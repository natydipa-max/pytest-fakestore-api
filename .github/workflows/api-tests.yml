name: API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://fakestoreapi.com' }}
          DEFAULT_TIMEOUT: ${{ vars.DEFAULT_TIMEOUT || '10' }}
        run: |
          pytest --tb=short -v